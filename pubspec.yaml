name: bible_blocks
description: "성경 읽기 시각화 앱 — 체크할수록 3D 성경책이 완성됩니다"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  google_sign_in: ^7.2.0
  go_router: ^17.2.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  freezed: ^3.2.5
  json_serializable: ^6.13.1

flutter:
  uses-material-design: true
