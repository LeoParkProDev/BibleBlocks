name: bible_blocks
description: "성경 읽기 시각화 앱 — 체크할수록 3D 성경책이 완성됩니다"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  kakao_flutter_sdk_user: ^1.9.5
  go_router: ^17.2.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  shared_preferences: ^2.5.3
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0
  share_plus: ^10.1.4
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  freezed: ^3.2.5
  json_serializable: ^6.13.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#C47B5A"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true
